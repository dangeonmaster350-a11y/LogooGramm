<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LogoGramm — Мессенджер 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- ЭКРАН АВТОРИЗАЦИИ -->
        <div class="screen auth-screen active" id="authScreen">
            <div class="logo-container">
                <div class="logo-3d">📱</div>
                <h1>LogoGramm</h1>
                <p class="version">Безопасный мессенджер</p>
            </div>
            <div class="auth-form">
                <select id="countryCode">
                    <option value="+7">🇷🇺 +7</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                </select>
                <input type="tel" id="phoneInput" placeholder="Номер телефона" class="input-field">
                <button id="sendCodeBtn" class="btn-primary">Получить код</button>
                <div id="codeSection" style="display: none;">
                    <input type="text" id="codeInput" placeholder="5-значный код" maxlength="5" class="input-field">
                    <button id="verifyBtn" class="btn-primary">Войти</button>
                </div>
            </div>
        </div>

        <!-- ОСНОВНОЙ ЭКРАН -->
        <div class="screen main-screen" id="mainScreen" style="display: none;">
            <!-- Левое меню (чаты) -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-avatar" id="profileAvatar">👤</div>
                    <div class="user-info-header">
                        <div class="user-name" id="profileName">Загрузка...</div>
                        <div class="user-username" id="profileUsername">@username</div>
                    </div>
                    <button id="openProfileBtn" class="icon-btn">⚙️</button>
                </div>
                
                <!-- Поиск -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск по юзернейму..." class="search-input">
                    <div id="searchResults" class="search-results"></div>
                </div>
                
                <div class="chats-list" id="chatsList"></div>
                
                <div class="bottom-menu">
                    <button class="menu-btn active" data-view="chats">💬 Чаты</button>
                    <button class="menu-btn" data-view="groups">👥 Группы</button>
                    <button class="menu-btn" data-view="channels">📢 Каналы</button>
                </div>
            </div>
            
            <!-- Правая область (чат) -->
            <div class="chat-area" id="chatArea">
                <div class="chat-header" id="chatHeader">
                    <button class="back-btn" id="backBtn" style="display: none;">←</button>
                    <div class="chat-title">LogoGramm</div>
                    <div class="chat-actions">
                        <button id="infoBtn" class="icon-btn">ℹ️</button>
                    </div>
                </div>
                
                <div class="messages-area" id="messagesArea">
                    <div class="placeholder">Выберите чат</div>
                </div>
                
                <div class="input-area" id="inputArea" style="display: none;">
                    <button id="voiceBtn" class="voice-btn">🎤</button>
                    <input type="text" id="messageInput" placeholder="Сообщение..." class="message-input">
                    <button id="sendBtn" class="send-btn">📤</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛ ПРОФИЛЯ (как в Telegram) -->
        <div class="modal" id="profileModal">
            <div class="modal-content profile-modal">
                <div class="modal-header">
                    <button class="close-modal">←</button>
                    <h3>Профиль</h3>
                </div>
                <div class="profile-avatar-section">
                    <div class="big-avatar" id="bigAvatar">👤</div>
                    <button id="changeAvatarBtn" class="avatar-btn">Изменить</button>
                </div>
                <div class="profile-fields">
                    <div class="profile-field">
                        <label>Имя</label>
                        <input type="text" id="editName" placeholder="Имя" class="profile-input">
                    </div>
                    <div class="profile-field">
                        <label>Юзернейм</label>
                        <div class="username-input-group">
                            <span>@</span>
                            <input type="text" id="editUsername" placeholder="username" class="profile-input">
                        </div>
                    </div>
                    <div class="profile-field">
                        <label>О себе</label>
                        <textarea id="editBio" placeholder="О себе" class="profile-textarea" rows="3"></textarea>
                    </div>
                    <div class="profile-info-stats">
                        <div class="info-item">📱 Номер: <span id="profilePhone"></span></div>
                        <div class="info-item">📅 ID: <span id="profileId"></span></div>
                    </div>
                    <button id="saveProfileBtn" class="btn-primary">Сохранить</button>
                    <button id="logoutBtn" class="btn-secondary">Выйти из аккаунта</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛ ИНФО О ЧАТЕ -->
        <div class="modal" id="chatInfoModal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="close-chat-info">←</button>
                    <h3 id="chatInfoTitle">Информация</h3>
                </div>
                <div id="chatInfoContent"></div>
            </div>
        </div>

        <!-- ЗАПИСЬ ГОЛОСОВОГО -->
        <div class="voice-recorder" id="voiceRecorder" style="display: none;">
            <div class="recorder-content">
                <div class="recording-wave">🎤 ● Запись...</div>
                <div class="recording-timer" id="recordingTimer">0:00</div>
                <div class="recorder-buttons">
                    <button id="stopRecordingBtn" class="btn-danger">Остановить</button>
                    <button id="cancelRecordingBtn" class="btn-secondary">Отмена</button>
                </div>
            </div>
        </div>

        <!-- ПЛЕЕР ГОЛОСОВОГО -->
        <div class="audio-player" id="audioPlayer" style="display: none;">
            <div class="audio-content">
                <span>🔊 Голосовое</span>
                <audio id="audioPlayback" controls></audio>
                <button id="closeAudioBtn" class="close-audio">✕</button>
            </div>
        </div>
    </div>

    <!-- КОНТЕКСТНОЕ МЕНЮ -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <button data-action="reply">💬 Ответить</button>
        <button data-action="edit">✏️ Изменить</button>
        <button data-action="pin">📌 Закрепить</button>
        <button data-action="delete">🗑️ Удалить</button>
        <div class="reactions">
            <span data-reaction="👍">👍</span>
            <span data-reaction="❤️">❤️</span>
            <span data-reaction="🔥">🔥</span>
            <span data-reaction="😢">😢</span>
            <span data-reaction="🎉">🎉</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
