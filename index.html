<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LogoGramm — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; height: 100vh; overflow: hidden; }
        
        /* АВТОРИЗАЦИЯ */
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; }
        .logo-3d { font-size: 80px; animation: float 3s ease-in-out infinite; text-align: center; margin-bottom: 20px; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo-container h1 { font-size: 42px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 30px; }
        .auth-form { width: 100%; max-width: 350px; margin: 0 auto; }
        .input-field { width: 100%; padding: 15px; margin: 8px 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-size: 16px; }
        .btn-primary { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .info-text { text-align: center; color: #667eea; font-size: 12px; margin-top: 20px; }
        
        /* ОСНОВНОЙ ЭКРАН */
        .main-screen { display: flex; flex-direction: column; height: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1f1f1f; border-bottom: 1px solid #2c2c2c; }
        .header h1 { color: white; font-size: 18px; }
        .header-btn { background: none; border: none; font-size: 24px; color: white; cursor: pointer; padding: 8px; }
        
        /* Список пользователей */
        .users-container { flex: 1; overflow-y: auto; padding: 10px; }
        .user-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1f1f1f; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .user-card:hover { background: #2c2c2c; }
        .user-avatar { width: 50px; height: 50px; background: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-info { flex: 1; }
        .user-name { color: white; font-weight: bold; }
        .user-nick { color: #888; font-size: 12px; }
        .user-status { font-size: 11px; color: #4cd964; margin-top: 4px; }
        .write-icon { font-size: 20px; color: #667eea; }
        
        /* Окно чата */
        .chat-window { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #121212; z-index: 100; display: none; flex-direction: column; }
        .chat-window.show { display: flex; }
        .chat-header { display: flex; align-items: center; padding: 12px 16px; background: #1f1f1f; gap: 12px; }
        .back-btn { background: none; border: none; font-size: 28px; color: white; cursor: pointer; }
        .chat-user-name { color: white; font-size: 17px; font-weight: bold; }
        .chat-user-nick { color: #888; font-size: 12px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; }
        .message-out { background: #667eea; color: white; align-self: flex-end; }
        .message-in { background: #2c2c2c; color: white; align-self: flex-start; }
        .message-text { word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
        .input-area { display: flex; gap: 10px; padding: 12px; background: #1f1f1f; }
        .message-input { flex: 1; padding: 12px; background: #2c2c2c; border: none; border-radius: 25px; color: white; font-size: 16px; }
        .send-btn { width: 44px; height: 44px; background: #667eea; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; }
        
        .empty-state { text-align: center; color: #666; padding: 50px; }
        
        /* Меню */
        .side-menu { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #1f1f1f; z-index: 200; transform: translateX(-100%); transition: transform 0.3s; }
        .side-menu.open { transform: translateX(0); }
        .menu-user { padding: 30px 20px; background: #2c2c2c; text-align: center; }
        .menu-avatar { width: 70px; height: 70px; background: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 10px; }
        .menu-name { color: white; font-size: 18px; font-weight: bold; }
        .menu-nick { color: #888; font-size: 13px; }
        .menu-list { padding: 10px 0; }
        .menu-item { width: 100%; padding: 15px 20px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; }
        .menu-item:hover { background: #2c2c2c; }
        .logout { color: #ff4444; margin-top: 20px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 199; display: none; }
        .overlay.show { display: block; }
        
        /* Модалки */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal.show { display: flex; }
        .modal-content { background: #1f1f1f; border-radius: 20px; width: 90%; max-width: 400px; padding: 20px; }
        .modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .modal-header h3 { color: white; }
        .close-modal { background: none; border: none; font-size: 24px; color: white; cursor: pointer; }
        .profile-field { margin-bottom: 15px; }
        .profile-field label { color: #888; font-size: 12px; display: block; margin-bottom: 5px; }
        .profile-input { width: 100%; padding: 12px; background: #2c2c2c; border: none; border-radius: 12px; color: white; font-size: 16px; }
        .big-avatar { width: 80px; height: 80px; background: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; }
        
        .premium-badge { background: linear-gradient(135deg, #ffd700, #ff8c00); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; display: inline-block; margin-top: 8px; }
        .plan { background: #2c2c2c; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 12px; position: relative; }
        .plan-price { font-size: 24px; font-weight: bold; color: #ffd700; }
        .plan-period { color: #888; }
        .plan-save { color: #4cd964; font-size: 12px; }
        .plan-buy { margin-top: 10px; padding: 8px 20px; background: #667eea; border: none; border-radius: 20px; color: white; cursor: pointer; }
        .premium-plan { border: 2px solid #ffd700; }
        .plan-badge { position: absolute; top: -10px; right: 10px; background: #ffd700; color: black; padding: 2px 10px; border-radius: 20px; font-size: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- ВХОД -->
        <div class="auth-screen" id="authScreen">
            <div class="logo-3d">📱</div>
            <div class="logo-container"><h1>LogoGramm</h1></div>
            <div class="auth-form">
                <input type="text" id="regNickname" placeholder="Ник (alex, maria...)" class="input-field">
                <input type="text" id="regName" placeholder="Ваше имя" class="input-field">
                <button id="registerBtn" class="btn-primary">➡️ Войти</button>
            </div>
            <div class="info-text">✨ Откройте две вкладки с разными никами — сообщения приходят автоматически!</div>
        </div>

        <!-- ОСНОВНОЙ ЭКРАН -->
        <div class="main-screen" id="mainScreen" style="display: none;">
            <div class="header">
                <button id="menuBtn" class="header-btn">☰</button>
                <h1>LogoGramm</h1>
                <div></div>
            </div>
            
            <div class="users-container" id="usersList"></div>
        </div>

        <!-- МЕНЮ -->
        <div class="side-menu" id="sideMenu">
            <div class="menu-user">
                <div class="menu-avatar" id="menuAvatar">👤</div>
                <div class="menu-name" id="menuName"></div>
                <div class="menu-nick" id="menuNick"></div>
                <div class="premium-badge" id="menuPremium" style="display: none;">⭐ Premium</div>
            </div>
            <div class="menu-list">
                <div class="menu-item" id="openProfile">👤 Мой профиль</div>
                <div class="menu-item" id="openPremium">⭐ Logo Premium</div>
                <div class="menu-item logout" id="logoutBtn">🚪 Выйти</div>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>

        <!-- ОКНО ЧАТА -->
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <button id="closeChatBtn" class="back-btn">←</button>
                <div>
                    <div class="chat-user-name" id="chatUserName"></div>
                    <div class="chat-user-nick" id="chatUserNick"></div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." class="message-input">
                <button id="sendMsgBtn" class="send-btn">📤</button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div class="modal" id="profileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="close-modal">←</button>
                    <h3>Профиль</h3>
                </div>
                <div class="big-avatar" id="profileAvatar">👤</div>
                <div class="profile-field">
                    <label>Имя</label>
                    <input type="text" id="profileName" class="profile-input">
                </div>
                <div class="profile-field">
                    <label>Юзернейм</label>
                    <input type="text" id="profileNick" class="profile-input">
                </div>
                <button id="saveProfile" class="btn-primary">Сохранить</button>
            </div>
        </div>

        <!-- PREMIUM -->
        <div class="modal" id="premiumModal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="close-modal">←</button>
                    <h3>⭐ Logo Premium</h3>
                </div>
                <div class="plan" data-months="1">
                    <div class="plan-price">100 ₽</div>
                    <div class="plan-period">1 месяц</div>
                    <button class="plan-buy">Купить</button>
                </div>
                <div class="plan" data-months="3">
                    <div class="plan-price">300 ₽</div>
                    <div class="plan-period">3 месяца</div>
                    <div class="plan-save">-20%</div>
                    <button class="plan-buy">Купить</button>
                </div>
                <div class="plan premium-plan" data-months="12">
                    <div class="plan-badge">🔥 Лучшее</div>
                    <div class="plan-price">700 ₽</div>
                    <div class="plan-period">1 год</div>
                    <div class="plan-save">-40%</div>
                    <button class="plan-buy">Купить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let currentChat = null;
        let allUsers = [];
        let premiumUsers = [];
        let updateInterval = null;

        // ========== ЗАГРУЗКА ==========
        function loadData() {
            let u = localStorage.getItem('lg_users');
            if (u) allUsers = JSON.parse(u);
            else allUsers = [];
            
            let p = localStorage.getItem('lg_premium');
            if (p) premiumUsers = JSON.parse(p);
            else premiumUsers = [];
            
            let saved = localStorage.getItem('lg_currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                if (!allUsers.find(u => u.id === currentUser.id)) {
                    allUsers.push(currentUser);
                    saveUsers();
                }
            }
        }

        function saveUsers() { localStorage.setItem('lg_users', JSON.stringify(allUsers)); }
        function savePremium() { localStorage.setItem('lg_premium', JSON.stringify(premiumUsers)); }
        function saveCurrentUser() { localStorage.setItem('lg_currentUser', JSON.stringify(currentUser)); }

        function hasPremium(userId) {
            let p = premiumUsers.find(p => p.userId === userId);
            if (!p) return false;
            if (p.expiresAt < Date.now()) {
                premiumUsers = premiumUsers.filter(p => p.userId !== userId);
                savePremium();
                return false;
            }
            return true;
        }

        // ========== ОБНОВЛЕНИЕ В РЕАЛЬНОМ ВРЕМЕНИ ==========
        function startAutoUpdate() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (currentChat) renderMessages();
                renderUsersList();
            }, 500);
        }

        // ========== ВХОД ==========
        function setupAuth() {
            if (currentUser) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
                updateUI();
                renderUsersList();
                startAutoUpdate();
                return;
            }
            
            document.getElementById('registerBtn').onclick = () => {
                let nick = document.getElementById('regNickname').value.trim().toLowerCase();
                let name = document.getElementById('regName').value.trim();
                if (!nick || !name) return alert('Заполните все поля');
                if (allUsers.find(u => u.nickname === nick)) return alert('Ник занят');
                
                currentUser = {
                    id: 'u_' + Date.now(),
                    nickname: nick,
                    name: name,
                    avatar: '👤'
                };
                allUsers.push(currentUser);
                saveUsers();
                saveCurrentUser();
                
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
                updateUI();
                renderUsersList();
                startAutoUpdate();
            };
        }

        function updateUI() {
            document.getElementById('menuName').innerText = currentUser.name;
            document.getElementById('menuNick').innerText = '@' + currentUser.nickname;
            document.getElementById('menuAvatar').innerText = currentUser.avatar;
            document.getElementById('profileAvatar').innerText = currentUser.avatar;
            document.getElementById('profileName').value = currentUser.name;
            document.getElementById('profileNick').value = currentUser.nickname;
            document.getElementById('menuPremium').style.display = hasPremium(currentUser.id) ? 'inline-block' : 'none';
        }

        // ========== СПИСОК ПОЛЬЗОВАТЕЛЕЙ (ВСЕ СРАЗУ ВИДНЫ) ==========
        function renderUsersList() {
            let container = document.getElementById('usersList');
            let others = allUsers.filter(u => u.id !== currentUser?.id);
            
            if (others.length === 0) {
                container.innerHTML = '<div class="empty-state">👥 Пока нет других пользователей. Откройте вторую вкладку!</div>';
                return;
            }
            
            container.innerHTML = others.map(user => `
                <div class="user-card" data-id="${user.id}">
                    <div class="user-avatar">${user.avatar || '👤'}</div>
                    <div class="user-info">
                        <div class="user-name">${user.name} ${hasPremium(user.id) ? '⭐' : ''}</div>
                        <div class="user-nick">@${user.nickname}</div>
                        <div class="user-status">🟢 на связи</div>
                    </div>
                    <div class="write-icon">✉️</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.user-card').forEach(el => {
                el.onclick = () => {
                    let user = allUsers.find(u => u.id === el.dataset.id);
                    if (user) openChat(user);
                };
            });
        }

        // ========== ЧАТ ==========
        function getChatKey(id1, id2) { return `chat_${[id1, id2].sort().join('_')}`; }
        function getMessages(key) { let m = localStorage.getItem(key); return m ? JSON.parse(m) : []; }
        function saveMessages(key, msgs) { localStorage.setItem(key, JSON.stringify(msgs)); }

        function openChat(user) {
            currentChat = user;
            document.getElementById('chatUserName').innerText = user.name;
            document.getElementById('chatUserNick').innerText = '@' + user.nickname;
            document.getElementById('chatWindow').classList.add('show');
            renderMessages();
        }

        function renderMessages() {
            let container = document.getElementById('messagesArea');
            if (!currentChat) return;
            let key = getChatKey(currentUser.id, currentChat.id);
            let msgs = getMessages(key);
            
            if (msgs.length === 0) {
                container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
                return;
            }
            
            container.innerHTML = msgs.map(m => `
                <div class="message ${m.senderId === currentUser.id ? 'message-out' : 'message-in'}">
                    <div class="message-text">${escapeHtml(m.text)}</div>
                    <div class="message-time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text || !currentChat) return;
            
            let msg = {
                id: Date.now(),
                text: text,
                senderId: currentUser.id,
                time: Date.now()
            };
            
            let key = getChatKey(currentUser.id, currentChat.id);
            let msgs = getMessages(key);
            msgs.push(msg);
            saveMessages(key, msgs);
            
            input.value = '';
            renderMessages();
            console.log(`✅ ${currentUser.name} -> ${currentChat.name}: ${text}`);
        }

        // ========== МЕНЮ ==========
        function setupMenu() {
            document.getElementById('menuBtn').onclick = () => {
                document.getElementById('sideMenu').classList.add('open');
                document.getElementById('overlay').classList.add('show');
            };
            document.getElementById('overlay').onclick = () => {
                document.getElementById('sideMenu').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
            };
            document.getElementById('openProfile').onclick = () => {
                document.getElementById('profileModal').classList.add('show');
                closeMenu();
            };
            document.getElementById('openPremium').onclick = () => {
                document.getElementById('premiumModal').classList.add('show');
                closeMenu();
            };
            document.getElementById('logoutBtn').onclick = () => {
                if (confirm('Выйти?')) {
                    localStorage.removeItem('lg_currentUser');
                    if (updateInterval) clearInterval(updateInterval);
                    location.reload();
                }
            };
            function closeMenu() {
                document.getElementById('sideMenu').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
            }
        }

        // ========== ПРОФИЛЬ ==========
        function setupProfile() {
            document.querySelectorAll('.close-modal').forEach(btn => {
                btn.onclick = () => {
                    document.getElementById('profileModal').classList.remove('show');
                    document.getElementById('premiumModal').classList.remove('show');
                };
            });
            document.getElementById('saveProfile').onclick = () => {
                let newName = document.getElementById('profileName').value;
                let newNick = document.getElementById('profileNick').value.trim().toLowerCase();
                if (newNick !== currentUser.nickname && allUsers.find(u => u.nickname === newNick && u.id !== currentUser.id)) {
                    return alert('Ник занят');
                }
                currentUser.name = newName;
                currentUser.nickname = newNick;
                let userInList = allUsers.find(u => u.id === currentUser.id);
                if (userInList) { userInList.name = newName; userInList.nickname = newNick; }
                saveUsers();
                saveCurrentUser();
                updateUI();
                renderUsersList();
                document.getElementById('profileModal').classList.remove('show');
                alert('Профиль обновлён');
            };
        }

        // ========== PREMIUM ==========
        function setupPremium() {
            document.querySelectorAll('.plan-buy').forEach(btn => {
                btn.onclick = (e) => {
                    let plan = e.target.closest('.plan');
                    let months = parseInt(plan.dataset.months);
                    let price = months === 1 ? 100 : months === 3 ? 300 : 700;
                    if (confirm(`Купить Premium на ${months} мес. за ${price}₽?`)) {
                        let existing = premiumUsers.find(p => p.userId === currentUser.id);
                        if (existing) existing.expiresAt += months * 30 * 24 * 60 * 60 * 1000;
                        else premiumUsers.push({ userId: currentUser.id, expiresAt: Date.now() + months * 30 * 24 * 60 * 60 * 1000 });
                        savePremium();
                        updateUI();
                        alert('Premium оформлен!');
                        document.getElementById('premiumModal').classList.remove('show');
                    }
                };
            });
        }

        // ========== ЧАТ ==========
        function setupChat() {
            document.getElementById('closeChatBtn').onclick = () => {
                document.getElementById('chatWindow').classList.remove('show');
                currentChat = null;
            };
            document.getElementById('sendMsgBtn').onclick = sendMessage;
            document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        }

        function escapeHtml(t) { let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        // ========== ЗАПУСК ==========
        loadData();
        setupAuth();
        setupMenu();
        setupProfile();
        setupPremium();
        setupChat();
    </script>
</body>
</html>
